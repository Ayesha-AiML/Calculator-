<!DOCTYPE html>
<html>
<head>
<title>Ayesha Physics Calculator Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
width:430px;
max-height:95vh;
overflow:auto;
}

.brand{
font-size:28px;
font-weight:bold;
background:linear-gradient(90deg,#ff4d6d,#8b5cf6,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:350px;
height:50px;
font-size:18px;
margin:10px 0;
border:none;
border-radius:10px;
padding:10px;
}

button{
padding:8px;
margin:3px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

/* calculator buttons */
.num{background:#374151;color:white;width:60px;height:45px;}
.op{background:#f59e0b;color:white;width:60px;height:45px;}
.eq{background:#10b981;color:white;width:120px;}
.clear{background:#ef4444;color:white;width:120px;}

/* formula */
.formula{background:#8b5cf6;color:white;}

/* sections */
.section{
margin-top:10px;
padding:8px;
background:#0b1220;
border-radius:10px;
}

h4{
margin:5px 0;
color:#00e5ff;
font-size:13px;
}
</style>
</head>

<body>

<div class="box">

<div class="brand">AYESHA CALC PRO</div>

<p>Calculator + Physics Formulas</p>

<!-- DISPLAY -->
<input id="display" placeholder="Type or use buttons">

<br>

<!-- BASIC CALCULATOR -->
<button class="num" onclick="add('7')">7</button>
<button class="num" onclick="add('8')">8</button>
<button class="num" onclick="add('9')">9</button>
<button class="op" onclick="add('/')">÷</button>

<br>

<button class="num" onclick="add('4')">4</button>
<button class="num" onclick="add('5')">5</button>
<button class="num" onclick="add('6')">6</button>
<button class="op" onclick="add('*')">×</button>

<br>

<button class="num" onclick="add('1')">1</button>
<button class="num" onclick="add('2')">2</button>
<button class="num" onclick="add('3')">3</button>
<button class="op" onclick="add('-')">-</button>

<br>

<button class="num" onclick="add('0')">0</button>
<button class="num" onclick="add('.')">.</button>
<button class="eq" onclick="calculate()">= Solve</button>
<button class="op" onclick="add('+')">+</button>

<br>

<button class="clear" onclick="clearD()">Clear</button>

<!-- 1 MECHANICS -->
<div class="section">
<h4>Mechanics</h4>
<button class="formula" onclick="set('v = u + a*t')">Velocity</button>
<button class="formula" onclick="set('F = m*a')">Force</button>
<button class="formula" onclick="set('p = m*v')">Momentum</button>
<button class="formula" onclick="set('W = F*d')">Work</button>
<button class="formula" onclick="set('P = W/t')">Power</button>
<button class="formula" onclick="set('KE = 0.5*m*v*v')">Energy</button>
</div>

<!-- 2 ELECTRICITY -->
<div class="section">
<h4>Electricity</h4>
<button class="formula" onclick="set('V = I*R')">Ohm</button>
<button class="formula" onclick="set('P = V*I')">Power</button>
<button class="formula" onclick="set('R = R1 + R2')">Series</button>
<button class="formula" onclick="set('1/R = 1/R1 + 1/R2')">Parallel</button>
</div>

<!-- 3 WAVES -->
<div class="section">
<h4>Waves</h4>
<button class="formula" onclick="set('v = f*lambda')">Wave</button>
<button class="formula" onclick="set('f = 1/T')">Frequency</button>
</div>

<!-- 4 OPTICS -->
<div class="section">
<h4>Optics</h4>
<button class="formula" onclick="set('1/f = 1/v + 1/u')">Lens/Mirror</button>
<button class="formula" onclick="set('m = v/u')">Magnification</button>
</div>

<!-- 5 MODERN -->
<div class="section">
<h4>Modern Physics</h4>
<button class="formula" onclick="set('E = h*f')">Photon</button>
<button class="formula" onclick="set('lambda = h/p')">de Broglie</button>
</div>

</div>

<script>

/* ADD */
function add(v){
document.getElementById("display").value+=v;
}

/* CLEAR */
function clearD(){
document.getElementById("display").value="";
}

/* SET FORMULA */
function set(v){
document.getElementById("display").value=v;
}

/* CALCULATE (FULL SAFE) */
function calculate(){
try{
let text=document.getElementById("display").value;
let clean=text.replace(/[a-zA-Z= ]/g,'');
let result=Function("return "+clean)();
document.getElementById("display").value=result;
}catch{
alert("Invalid Input ❌");
}
}

</script>

</body>
</html>
