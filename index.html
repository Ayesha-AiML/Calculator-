<!DOCTYPE html>
<html>
<head>
<title>Ayesha Physics Master App</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111827;
padding:15px;
border-radius:20px;
width:480px;
max-height:95vh;
overflow:auto;
text-align:center;
}

.brand{
font-size:32px;
font-weight:bold;
background:linear-gradient(90deg,#ff4d6d,#8b5cf6,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:380px;
height:50px;
font-size:16px;
margin:10px 0;
border:none;
border-radius:10px;
padding:10px;
}

button{
padding:6px;
margin:3px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:11px;
}

/* calculator */
.num{background:#374151;color:white;width:55px;height:45px;}
.op{background:#f59e0b;color:white;width:55px;height:45px;}
.eq{background:#10b981;color:white;width:110px;}
.clear{background:#ef4444;color:white;width:110px;}

/* features */
.formula{background:#8b5cf6;color:white;}
.unit{background:#22c55e;color:white;}
.remove{background:#ef4444;color:white;}
.share{background:#3b82f6;color:white;}
.challenge{background:#f43f5e;color:white;}

/* history */
.history{
margin-top:10px;
background:#0b1220;
padding:10px;
border-radius:10px;
height:120px;
overflow:auto;
text-align:left;
font-size:12px;
}
</style>
</head>

<body>

<div class="box">

<!-- ⭐ AYESHA TITLE -->
<div class="brand">✨ AYESHA ✨</div>
<p>Physics Master Calculator App</p>

<!-- DISPLAY -->
<input id="display" placeholder="Type calculation">

<br>

<!-- CALCULATOR -->
<button class="num" onclick="add('7')">7</button>
<button class="num" onclick="add('8')">8</button>
<button class="num" onclick="add('9')">9</button>
<button class="op" onclick="add('/')">÷</button>

<br>

<button class="num" onclick="add('4')">4</button>
<button class="num" onclick="add('5')">5</button>
<button class="num" onclick="add('6')">6</button>
<button class="op" onclick="add('*')">×</button>

<br>

<button class="num" onclick="add('1')">1</button>
<button class="num" onclick="add('2')">2</button>
<button class="num" onclick="add('3')">3</button>
<button class="op" onclick="add('-')">-</button>

<br>

<button class="num" onclick="add('0')">0</button>
<button class="num" onclick="add('.')">.</button>
<button class="eq" onclick="solve()">= Solve</button>
<button class="op" onclick="add('+')">+</button>

<br>

<button class="clear" onclick="clearD()">Clear</button>
<button class="clear" onclick="clearHistory()">History Clear</button>
<button class="share" onclick="share()">Share</button>

<!-- ⚛ MECHANICS -->
<h4>Mechanics</h4>
<button class="formula" onclick="set('v = u + a*t')">Kinematics</button>
<button class="formula" onclick="set('F = m*a')">Force</button>
<button class="formula" onclick="set('p = m*v')">Momentum</button>
<button class="formula" onclick="set('W = F*d')">Work</button>
<button class="formula" onclick="set('KE = 0.5*m*v*v')">Energy</button>
<button class="remove" onclick="this.remove()">❌</button>

<!-- ⚡ ELECTRICITY -->
<h4>Electricity</h4>
<button class="formula" onclick="set('V = I*R')">Ohm Law</button>
<button class="formula" onclick="set('P = V*I')">Power</button>
<button class="formula" onclick="set('Q = I*t')">Charge</button>
<button class="formula" onclick="set('F = k*q1*q2/r*r')">Coulomb</button>
<button class="remove" onclick="this.remove()">❌</button>

<!-- 🌊 WAVES -->
<h4>Waves</h4>
<button class="formula" onclick="set('v = f*lambda')">Wave</button>
<button class="formula" onclick="set('f = 1/T')">Frequency</button>

<!-- 📏 UNITS -->
<h4>Units</h4>
<button class="unit" onclick="set('1 km = 1000 m')">KM</button>
<button class="unit" onclick="set('1 m = 100 cm')">M</button>
<button class="unit" onclick="set('1 kg = 1000 g')">KG</button>

<!-- 🎯 DAILY CHALLENGE -->
<h4>Daily Challenge</h4>
<button class="challenge" onclick="challenge()">New Challenge</button>
<div id="challengeBox"></div>

<!-- 📜 HISTORY -->
<div class="history" id="historyBox">
<b>History</b><br>
</div>

</div>

<script>

let history = JSON.parse(localStorage.getItem("history")) || [];

function add(v){
document.getElementById("display").value += v;
}

function set(v){
document.getElementById("display").value = v;
}

function clearD(){
document.getElementById("display").value = "";
}

function solve(){
try{
let text = document.getElementById("display").value;
let clean = text.replace(/[a-zA-Z= ]/g,'');
let result = Function("return "+clean)();

document.getElementById("display").value = result;

/* step by step */
document.getElementById("challengeBox").innerHTML =
"Step 1: " + text + "<br>Step 2: Solve<br>Answer: " + result;

/* history */
history.unshift(text + " = " + result);
localStorage.setItem("history", JSON.stringify(history));
showHistory();

}catch{
alert("Invalid ❌");
}
}

function showHistory(){
let box = document.getElementById("historyBox");
box.innerHTML = "<b>History</b><br>";
history.forEach(h=>{
box.innerHTML += "<div>"+h+"</div>";
});
}

function clearHistory(){
history = [];
localStorage.removeItem("history");
showHistory();
}

function share(){
let text = document.getElementById("display").value;
navigator.share?.({
title:"Ayesha Physics App",
text:"I solved: " + text + " using Ayesha App ⚡"
});
}

function challenge(){
let q = "Find force: m=2kg, a=3m/s²";
document.getElementById("challengeBox").innerHTML =
"Q: " + q + "<br>Answer: 6 N";
}

window.onload = showHistory;

</script>

</body>
</html>
