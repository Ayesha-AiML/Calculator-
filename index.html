<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ayesha Physics Master Pro V2</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.header{text-align:center;padding:15px;font-size:32px;font-weight:bold}
.card{background:#111827;margin:10px;padding:12px;border-radius:12px}
input{width:95%;padding:10px}
button{padding:8px;margin:3px;border-radius:8px;border:none}
</style>
</head>
<body>
<div class="header">✨ AYESHA ✨<br><small>Physics Master Pro V2</small></div>

<div class="card">
<h3>📊 Dashboard</h3>
XP: <span id="xp">0</span> |
Level: <span id="level">Beginner</span> |
🔥 Streak: <span id="streak">0</span>
</div>

<div class="card">
<h3>🧮 Calculator</h3>
<input id="display">
<br>
<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">÷</button><br>
<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('*')">×</button><br>
<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">-</button><br>
<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>
<button onclick="solve()">=</button>
<button onclick="add('+')">+</button><br>
<button onclick="add('Math.sin(')">sin</button>
<button onclick="add('Math.cos(')">cos</button>
<button onclick="add('Math.tan(')">tan</button>
<button onclick="add('Math.PI')">π</button>
<button onclick="backspace()">⌫</button>
<button onclick="clearD()">AC</button>
</div>

<div class="card">
<h3>⚛ Physics Formula Hub</h3>
<p>F=ma | V=IR | P=VI | v=u+at | KE=½mv² | PE=mgh | E=hf | E=mc²</p>
</div>

<div class="card">
<h3>🎯 Daily Challenge</h3>
<p>Find Force if m=2kg and a=3m/s²</p>
<input id="ans">
<button onclick="check()">Submit</button>
</div>

<div class="card">
<h3>📜 History</h3>
<div id="history"></div>
<button onclick="clearHistory()">Clear History</button>
</div>

<script>
let history=JSON.parse(localStorage.getItem('history')||'[]');
let xp=0;

function add(v){display.value+=v}
function clearD(){display.value=''}
function backspace(){display.value=display.value.slice(0,-1)}
function solve(){
try{
let r=eval(display.value);
history.unshift(display.value+'='+r);
localStorage.setItem('history',JSON.stringify(history));
display.value=r;
xp++;
document.getElementById('xp').innerText=xp;
showHistory();
}catch{alert('Invalid Input');}
}
function showHistory(){
document.getElementById('history').innerHTML=history.join('<br>');
}
function clearHistory(){
history=[];localStorage.removeItem('history');showHistory();
}
function check(){
if(ans.value=='6'){alert('Correct 🏆');}
else{alert('Try Again');}
}
showHistory();
</script>
</body>
</html>
