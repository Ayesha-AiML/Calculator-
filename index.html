<!DOCTYPE html>
<html>
<head>
<title>Ayesha Study Smart App</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* SPLASH SCREEN */
#splash{
position:fixed;
width:100%;
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

.logo{
font-size:45px;
font-weight:900;
background:linear-gradient(90deg,#ff4d6d,#8b5cf6,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation: glow 2s infinite alternate;
}

@keyframes glow{
0%{filter:drop-shadow(0 0 5px #ff4d6d);}
100%{filter:drop-shadow(0 0 20px #00e5ff);}
}

/* MAIN APP */
.box{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
width:340px;
display:none;
}

.brand{
font-size:28px;
font-weight:bold;
background:linear-gradient(90deg,#ff4d6d,#8b5cf6,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:280px;
height:50px;
font-size:18px;
margin:10px 0;
border:none;
border-radius:10px;
padding:10px;
}

button{
padding:10px;
margin:4px;
border:none;
border-radius:8px;
cursor:pointer;
}

.solve{background:#10b981;color:white;}
.ex{background:#8b5cf6;color:white;}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1 class="logo">AYESHA</h1>
  <p>Study Smart App</p>
</div>

<!-- APP -->
<div class="box" id="app">

<div class="brand">AYESHA</div>
<p>Study Smart Solver</p>

<!-- INPUT -->
<input id="input" placeholder="Type: v = 20 / 5 or F = 10 * 5">

<br>

<!-- QUICK EXAMPLES -->
<button class="ex" onclick="setText('v = 20 / 5')">Speed</button>
<button class="ex" onclick="setText('F = 10 * 5')">Force</button>
<button class="ex" onclick="setText('V = 2 * 3')">Ohm</button>

<br>

<button class="solve" onclick="solve()">Solve</button>

<p id="result" style="margin-top:10px;font-weight:bold;"></p>

</div>

<script>

/* SPLASH CONTROL */
window.onload=function(){
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("app").style.display="block";
},2000);
}

/* SET EXAMPLES */
function setText(v){
document.getElementById("input").value=v;
}

/* SOLVER */
function solve(){
let text=document.getElementById("input").value;

/* SPEED */
if(text.includes("v") && text.includes("/")){
let nums=text.match(/\d+/g);
if(nums.length>=2){
let result=nums[0]/nums[1];
show("Speed = "+nums[0]+" ÷ "+nums[1]+" = "+result+" m/s");
}
}

/* FORCE */
else if(text.includes("F") || text.includes("*")){
let nums=text.match(/\d+/g);
if(nums.length>=2){
let result=nums[0]*nums[1];
show("Force = "+nums[0]+" × "+nums[1]+" = "+result+" N");
}
}

/* GENERAL */
else{
try{
let clean=text.replace(/[a-zA-Z= ]/g,"");
let result=Function("return "+clean)();
show("Answer = "+result);
}catch{
show("Invalid Input ❌");
}
}
}

/* SHOW RESULT */
function show(r){
document.getElementById("result").innerText=r;
}

</script>

</body>
</html>
