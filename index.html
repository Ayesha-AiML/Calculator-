<!DOCTYPE html>
<html>
<head>
<title>Calculator Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111827;
padding:20px;
border-radius:12px;
text-align:center;
}

input{
width:240px;
padding:10px;
margin:5px;
border:none;
border-radius:8px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

#calc{display:none;}
</style>
</head>

<body>

<div class="box">

<!-- LOGIN -->
<div id="login">
<h3>🔐 Calculator Login</h3>
<p id="text">Set your password</p>

<input type="password" id="pass" placeholder="Enter Password"><br>

<button onclick="handle()">Continue</button>
</div>

<!-- CALCULATOR -->
<div id="calc">
<h3>💖 Calculator</h3>

<input id="display" readonly><br>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('+')">+</button><br>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('-')">-</button><br>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('*')">*</button><br>

<button onclick="append('0')">0</button>
<button onclick="calculate()">=</button>
<button onclick="clearD()">C</button>

<br><br>
<button onclick="logout()">Logout</button>

</div>

</div>

<script>

let saved = localStorage.getItem("password");

/* check first time */
if(saved){
document.getElementById("text").innerText="Enter your password";
}

/* first time set OR login */
function handle(){
let p = document.getElementById("pass").value;

if(!saved){
localStorage.setItem("password", p);
alert("Password Set Successfully!");
showCalc();
}else{
if(p === saved){
showCalc();
}else{
alert("Wrong Password");
}
}
}

/* calculator */
function append(v){
document.getElementById("display").value += v;
}

function clearD(){
document.getElementById("display").value="";
}

function calculate(){
try{
document.getElementById("display").value =
eval(document.getElementById("display").value);
}catch{
alert("Error");
}
}

/* logout */
function logout(){
document.getElementById("login").style.display="block";
document.getElementById("calc").style.display="none";
document.getElementById("pass").value="";
}

/* show calculator */
function showCalc(){
document.getElementById("login").style.display="none";
document.getElementById("calc").style.display="block";
}

</script>

</body>
</html>
