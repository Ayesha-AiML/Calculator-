<!DOCTYPE html>
<html>
<head>
<title>Ayesha Pro Calculator</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
background:linear-gradient(135deg,#141e30,#243b55);
overflow:hidden;
transition:0.5s;
}

/* hearts background */
.heart{
position:absolute;
color:pink;
animation:float 6s linear infinite;
font-size:20px;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

.calculator{
background:#111827;
padding:25px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
text-align:center;
z-index:1;
}

.brand{
color:#ff4d6d;
font-size:22px;
font-weight:bold;
margin-bottom:5px;
}

.tag{
color:#9ca3af;
font-size:12px;
margin-bottom:10px;
}

#display{
width:280px;
height:60px;
font-size:26px;
text-align:right;
margin-bottom:10px;
border:none;
outline:none;
padding:10px;
border-radius:10px;
background:#1f2937;
color:white;
}

button{
width:65px;
height:65px;
margin:5px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.1);
}

.num{background:#374151;color:white;}
.op{background:#f59e0b;color:white;}
.equal{background:#10b981;color:white;}
.clear{background:#ef4444;color:white;width:140px;}
.mode{background:#3b82f6;color:white;width:140px;}
</style>
</head>

<body>

<div class="calculator">

<div class="brand">💖 AYESHA 💖</div>
<div class="tag">Pro App Calculator</div>

<input type="text" id="display" readonly>

<br>

<button class="num" onclick="append('7')">7</button>
<button class="num" onclick="append('8')">8</button>
<button class="num" onclick="append('9')">9</button>
<button class="op" onclick="append('/')">÷</button>

<br>

<button class="num" onclick="append('4')">4</button>
<button class="num" onclick="append('5')">5</button>
<button class="num" onclick="append('6')">6</button>
<button class="op" onclick="append('*')">×</button>

<br>

<button class="num" onclick="append('1')">1</button>
<button class="num" onclick="append('2')">2</button>
<button class="num" onclick="append('3')">3</button>
<button class="op" onclick="append('-')">-</button>

<br>

<button class="num" onclick="append('0')">0</button>
<button class="num" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button class="op" onclick="append('+')">+</button>

<br>

<button class="clear" onclick="clearDisplay()">C</button>
<button class="mode" onclick="toggleMode()">🌙 Mode</button>

</div>

<script>

// sound effect
function clickSound(){
let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
audio.play();
}

// append
function append(v){
clickSound();
document.getElementById("display").value += v;
}

// clear
function clearDisplay(){
clickSound();
document.getElementById("display").value = "";
}

// calculate
function calculate(){
try{
document.getElementById("display").value =
eval(document.getElementById("display").value);
}
catch{
alert("Invalid Input");
}
}

// dark/light mode
function toggleMode(){
document.body.classList.toggle("light");
}

// hearts animation
function createHeart(){
let heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML = "💖";
heart.style.left = Math.random()*100 + "vw";
heart.style.fontSize = Math.random()*20 + 10 + "px";
document.body.appendChild(heart);

setTimeout(()=>{ heart.remove(); },6000);
}

setInterval(createHeart,800);

</script>

</body>
</html>
