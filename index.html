<!DOCTYPE html>
<html>
<head>
<title>Physics Formula Calculator</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
width:420px;
max-height:90vh;
overflow:auto;
}

.brand{
font-size:28px;
font-weight:bold;
background:linear-gradient(90deg,#ff4d6d,#8b5cf6,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:340px;
height:50px;
font-size:18px;
margin:10px 0;
border:none;
border-radius:10px;
padding:10px;
}

button{
padding:8px;
margin:3px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.solve{background:#10b981;color:white;width:120px;}
.clear{background:#ef4444;color:white;width:120px;}
.formula{background:#8b5cf6;color:white;}

/* sections */
.section{
margin-top:10px;
padding:8px;
background:#0b1220;
border-radius:10px;
}

h4{
margin:5px 0;
color:#00e5ff;
font-size:14px;
}
</style>
</head>

<body>

<div class="box">

<div class="brand">PHYSICS CALC</div>

<p>All Physics Formulas in One App</p>

<!-- INPUT -->
<input id="display" placeholder="Type or select formula">

<br>

<button class="solve" onclick="solve()">Solve</button>
<button class="clear" onclick="clearD()">Clear</button>

<!-- 1. MECHANICS -->
<div class="section">
<h4>1. Mechanics</h4>
<button class="formula" onclick="set('v = u + a*t')">Kinematics</button>
<button class="formula" onclick="set('F = m*a')">Force</button>
<button class="formula" onclick="set('p = m*v')">Momentum</button>
<button class="formula" onclick="set('W = F*d')">Work</button>
<button class="formula" onclick="set('P = W/t')">Power</button>
<button class="formula" onclick="set('KE = 0.5*m*v*v')">Energy</button>
<button class="formula" onclick="set('Fc = m*v*v/r')">Circular</button>
</div>

<!-- 2. ELECTRICITY -->
<div class="section">
<h4>2. Electricity</h4>
<button class="formula" onclick="set('V = I*R')">Ohm</button>
<button class="formula" onclick="set('P = V*I')">Power</button>
<button class="formula" onclick="set('R = R1 + R2')">Series</button>
<button class="formula" onclick="set('1/R = 1/R1 + 1/R2')">Parallel</button>
<button class="formula" onclick="set('F = k*q1*q2/r*r')">Coulomb</button>
<button class="formula" onclick="set('E = F/q')">Electric Field</button>
</div>

<!-- 3. WAVES -->
<div class="section">
<h4>3. Waves & SHM</h4>
<button class="formula" onclick="set('v = f*lambda')">Wave Speed</button>
<button class="formula" onclick="set('f = 1/T')">Frequency</button>
<button class="formula" onclick="set('T = 1/f')">Time Period</button>
<button class="formula" onclick="set('a = -omega*omega*x')">SHM</button>
</div>

<!-- 4. OPTICS -->
<div class="section">
<h4>4. Optics</h4>
<button class="formula" onclick="set('1/f = 1/v + 1/u')">Mirror</button>
<button class="formula" onclick="set('1/f = 1/v + 1/u')">Lens</button>
<button class="formula" onclick="set('m = v/u')">Magnification</button>
</div>

<!-- 5. THERMODYNAMICS -->
<div class="section">
<h4>5. Thermodynamics</h4>
<button class="formula" onclick="set('Q = m*c*deltaT')">Heat</button>
<button class="formula" onclick="set('W = P*V')">Work Gas</button>
</div>

<!-- 6. GRAVITATION -->
<div class="section">
<h4>6. Gravitation</h4>
<button class="formula" onclick="set('F = G*m1*m2/r*r')">Gravity</button>
<button class="formula" onclick="set('g = G*M/r*r')">g value</button>
</div>

<!-- 7. MODERN PHYSICS -->
<div class="section">
<h4>7. Modern Physics</h4>
<button class="formula" onclick="set('E = h*f')">Photon</button>
<button class="formula" onclick="set('E = h*f - work')">Photoelectric</button>
<button class="formula" onclick="set('lambda = h/p')">de Broglie</button>
</div>

</div>

<script>

/* SET */
function set(v){
document.getElementById("display").value=v;
}

/* CLEAR */
function clearD(){
document.getElementById("display").value="";
}

/* SOLVE BASIC MATH */
function solve(){
try{
let text=document.getElementById("display").value;
let clean=text.replace(/[a-zA-Z= ]/g,'');
let result=Function("return "+clean)();
document.getElementById("display").value=result;
}catch{
alert("Invalid Input ❌");
}
}

</script>

</body>
</html>
