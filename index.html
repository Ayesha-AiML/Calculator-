<!DOCTYPE html>
<html>
<head>
<title>Physics Pro Learning App</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111827;
padding:15px;
border-radius:20px;
text-align:center;
width:470px;
max-height:95vh;
overflow:auto;
}

.brand{
font-size:28px;
font-weight:bold;
background:linear-gradient(90deg,#ff4d6d,#8b5cf6,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:380px;
height:50px;
font-size:16px;
margin:8px 0;
border:none;
border-radius:10px;
padding:10px;
}

button{
padding:7px;
margin:3px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:11px;
}

/* calculator */
.num{background:#374151;color:white;width:55px;height:45px;}
.op{background:#f59e0b;color:white;width:55px;height:45px;}
.eq{background:#10b981;color:white;width:110px;}
.clear{background:#ef4444;color:white;width:110px;}

/* features */
.formula{background:#8b5cf6;color:white;}
.share{background:#3b82f6;color:white;}
.challenge{background:#f43f5e;color:white;}
.unit{background:#22c55e;color:white;}

/* sections */
.section{
margin-top:8px;
padding:8px;
background:#0b1220;
border-radius:10px;
}

h4{margin:5px;color:#00e5ff;font-size:13px;}

/* history */
.history{
margin-top:10px;
background:#0b1220;
padding:10px;
border-radius:10px;
height:120px;
overflow:auto;
text-align:left;
font-size:12px;
}
</style>
</head>

<body>

<div class="box">

<div class="brand">PHYSICS PRO</div>

<p>Learn + Solve + Compete</p>

<!-- DISPLAY -->
<input id="display" placeholder="Type calculation">

<br>

<!-- CALCULATOR -->
<button class="num" onclick="add('7')">7</button>
<button class="num" onclick="add('8')">8</button>
<button class="num" onclick="add('9')">9</button>
<button class="op" onclick="add('/')">÷</button>

<br>

<button class="num" onclick="add('4')">4</button>
<button class="num" onclick="add('5')">5</button>
<button class="num" onclick="add('6')">6</button>
<button class="op" onclick="add('*')">×</button>

<br>

<button class="num" onclick="add('1')">1</button>
<button class="num" onclick="add('2')">2</button>
<button class="num" onclick="add('3')">3</button>
<button class="op" onclick="add('-')">-</button>

<br>

<button class="num" onclick="add('0')">0</button>
<button class="num" onclick="add('.')">.</button>
<button class="eq" onclick="solve()">= Solve</button>
<button class="op" onclick="add('+')">+</button>

<br>

<button class="clear" onclick="clearD()">Clear</button>
<button class="clear" onclick="clearHistory()">Clear History</button>

<button class="share" onclick="shareResult()">Share</button>

<!-- PHYSICS FORMULAS -->
<div class="section">
<h4>⚛ Physics Formulas</h4>
<button class="formula" onclick="set('F = m*a')">Force</button>
<button class="formula" onclick="set('V = I*R')">Ohm</button>
<button class="formula" onclick="set('p = m*v')">Momentum</button>
<button class="formula" onclick="set('W = F*d')">Work</button>
<button class="formula" onclick="set('KE = 0.5*m*v*v')">Energy</button>
<button class="formula" onclick="set('v = f*lambda')">Wave</button>
</div>

<!-- UNITS -->
<div class="section">
<h4>📏 Units Converter</h4>
<button class="unit" onclick="set('1 m = 100 cm')">Meter-CM</button>
<button class="unit" onclick="set('1 kg = 1000 g')">Kg-Gram</button>
<button class="unit" onclick="set('1 km = 1000 m')">KM-M</button>
</div>

<!-- DAILY CHALLENGE -->
<div class="section">
<h4>🎯 Daily Challenge</h4>
<button class="challenge" onclick="setChallenge()">New Challenge</button>
<div id="challengeText"></div>
<div id="badge"></div>
</div>

<!-- HISTORY -->
<div class="history" id="historyBox">
<b>📜 History</b><br>
</div>

</div>

<script>

let history = JSON.parse(localStorage.getItem("history")) || [];

/* ADD */
function add(v){
document.getElementById("display").value += v;
}

/* SET */
function set(v){
document.getElementById("display").value = v;
}

/* CLEAR */
function clearD(){
document.getElementById("display").value = "";
}

/* SOLVE + STEP BY STEP */
function solve(){
try{
let text = document.getElementById("display").value;
let clean = text.replace(/[a-zA-Z= ]/g,'');
let result = Function("return "+clean)();

/* STEP BY STEP OUTPUT */
let steps = "Step 1: Input → " + text +
"<br>Step 2: Solve → " + result +
"<br>Answer ready ✔";

/* show steps */
document.getElementById("challengeText").innerHTML = steps;

document.getElementById("display").value = result;

/* HISTORY */
let record = text + " = " + result;
history.unshift(record);

localStorage.setItem("history", JSON.stringify(history));
showHistory();

}catch{
alert("Invalid Input ❌");
}
}

/* HISTORY */
function showHistory(){
let box = document.getElementById("historyBox");
box.innerHTML = "<b>📜 History</b><br>";
history.forEach(h=>{
box.innerHTML += "<div>"+h+"</div>";
});
}

/* CLEAR HISTORY */
function clearHistory(){
history = [];
localStorage.removeItem("history");
showHistory();
}

/* SHARE RESULT */
function shareResult(){
let text = document.getElementById("display").value;
if(navigator.share){
navigator.share({
title: "Physics Result",
text: "I solved: " + text + " using Physics Pro App ⚡"
});
}else{
alert("Share not supported in this browser");
}
}

/* DAILY CHALLENGE */
function setChallenge(){
let q = "A body of mass 2kg accelerated at 3 m/s². Find force?";
document.getElementById("challengeText").innerHTML = "Q: " + q;

/* badge system */
document.getElementById("badge").innerHTML =
"🏆 Complete challenge to earn Physics Master Badge";
}

/* LOAD */
window.onload = function(){
showHistory();
}

</script>

</body>
</html>
