<!DOCTYPE html>
<html>
<head>
<title>Ayesha Smart Calculator</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.box{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
width:400px;
}

.brand{
font-size:28px;
font-weight:bold;
background:linear-gradient(90deg,#ff4d6d,#8b5cf6,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:330px;
height:50px;
font-size:18px;
margin:10px 0;
border:none;
border-radius:10px;
padding:10px;
}

button{
padding:10px;
margin:4px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* buttons */
.num{background:#374151;color:white;width:60px;height:50px;}
.op{background:#f59e0b;color:white;width:60px;height:50px;}
.calc{background:#10b981;color:white;width:130px;}
.clear{background:#ef4444;color:white;width:130px;}
.formula{background:#8b5cf6;color:white;}

/* history */
.history{
margin-top:10px;
background:#0b1220;
padding:10px;
border-radius:10px;
height:120px;
overflow:auto;
text-align:left;
font-size:14px;
}
</style>
</head>

<body>

<div class="box">

<div class="brand">AYESHA</div>
<p>Smart Calculator + History</p>

<!-- INPUT -->
<input id="display" placeholder="Type calculation">

<br>

<!-- NORMAL CALCULATOR -->
<button class="num" onclick="add('7')">7</button>
<button class="num" onclick="add('8')">8</button>
<button class="num" onclick="add('9')">9</button>
<button class="op" onclick="add('/')">÷</button>

<br>

<button class="num" onclick="add('4')">4</button>
<button class="num" onclick="add('5')">5</button>
<button class="num" onclick="add('6')">6</button>
<button class="op" onclick="add('*')">×</button>

<br>

<button class="num" onclick="add('1')">1</button>
<button class="num" onclick="add('2')">2</button>
<button class="num" onclick="add('3')">3</button>
<button class="op" onclick="add('-')">-</button>

<br>

<button class="num" onclick="add('0')">0</button>
<button class="num" onclick="add('.')">.</button>
<button class="calc" onclick="calculate()">= Solve</button>
<button class="op" onclick="add('+')">+</button>

<br>

<button class="clear" onclick="clearD()">Clear</button>
<button class="clear" onclick="clearHistory()">Clear History</button>

<br><br>

<!-- FORMULAS -->
<button class="formula" onclick="set('F = m*a')">Force</button>
<button class="formula" onclick="set('V = I*R')">Ohm</button>
<button class="formula" onclick="set('p = m*v')">Momentum</button>
<button class="formula" onclick="set('PE = m*g*h')">Energy</button>

<!-- HISTORY -->
<div class="history" id="historyBox">
<b>📜 History</b><br>
</div>

</div>

<script>

let history = JSON.parse(localStorage.getItem("history")) || [];

/* ADD INPUT */
function add(v){
document.getElementById("display").value += v;
}

/* SET FORMULA */
function set(v){
document.getElementById("display").value = v;
}

/* CLEAR DISPLAY */
function clearD(){
document.getElementById("display").value="";
}

/* CALCULATE */
function calculate(){
try{
let text=document.getElementById("display").value;

let result=Function("return "+text)();
document.getElementById("display").value=result;

/* SAVE HISTORY */
let record = text + " = " + result;
history.unshift(record); // latest on top

localStorage.setItem("history", JSON.stringify(history));
showHistory();

}catch{
alert("Invalid Input ❌");
}
}

/* SHOW HISTORY */
function showHistory(){
let box=document.getElementById("historyBox");
box.innerHTML="<b>📜 History</b><br>";

history.forEach(h=>{
box.innerHTML += "<div>"+h+"</div>";
});
}

/* CLEAR HISTORY */
function clearHistory(){
history=[];
localStorage.removeItem("history");
showHistory();
}

/* LOAD ON START */
window.onload=function(){
showHistory();
}

</script>

</body>
</html>
