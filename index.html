<!DOCTYPE html>
<html>
<head>
<title>Smart Vault Calculator</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
background:#050816;
color:white;
}

.container{display:flex; gap:20px;}

.calculator,.game,.vault{
background:#0b1220;
padding:20px;
border-radius:15px;
width:280px;
text-align:center;
}

input{
width:240px;
height:50px;
font-size:20px;
text-align:right;
margin-bottom:10px;
border-radius:10px;
border:none;
}

button{
width:60px;
height:60px;
margin:4px;
border:none;
border-radius:10px;
cursor:pointer;
}

.num{background:#1f2937;color:white;}
.op{background:#ff9800;}
.equal{background:#00e676;}
.extra{background:#00bcd4;color:white;}
.clear{background:#ff5252;color:white;}
.mode{background:#8b5cf6;color:white;}
.small{width:120px;height:50px;}

.hiddenItem{
background:#1f2937;
padding:8px;
margin:5px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<!-- CALCULATOR -->
<div class="calculator">
<h3>💖 Calculator</h3>

<input id="display" readonly>

<br>

<!-- SHIFT MODE -->
<button class="mode" onclick="toggleShift()">SHIFT</button>
<button class="extra" onclick="append('(')">(</button>
<button class="extra" onclick="append(')')">)</button>

<br>

<button class="extra" onclick="trig('sin')">sin</button>
<button class="extra" onclick="trig('cos')">cos</button>
<button class="extra" onclick="trig('tan')">tan</button>

<button class="extra" onclick="square()">x²</button>
<button class="extra" onclick="cube()">x³</button>

<br>

<button class="num" onclick="append('7')">7</button>
<button class="num" onclick="append('8')">8</button>
<button class="num" onclick="append('9')">9</button>
<button class="op" onclick="append('/')">÷</button>

<br>

<button class="num" onclick="append('4')">4</button>
<button class="num" onclick="append('5')">5</button>
<button class="num" onclick="append('6')">6</button>
<button class="op" onclick="append('*')">×</button>

<br>

<button class="num" onclick="append('1')">1</button>
<button class="num" onclick="append('2')">2</button>
<button class="num" onclick="append('3')">3</button>
<button class="op" onclick="append('-')">-</button>

<br>

<button class="num" onclick="append('0')">0</button>
<button class="num" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button class="op" onclick="append('+')">+</button>

<br>

<button class="clear small" onclick="clearDisplay()">C</button>
<button class="small" onclick="openGame()">🎮 Game</button>
<button class="small" onclick="openVault()">🔐 Vault</button>

</div>

<!-- GAME -->
<div class="game" id="game" style="display:none;">
<h3>🎮 Guess Game</h3>
<p>Guess 1 - 10</p>

<input id="guess" placeholder="Enter">

<button onclick="check()">Check</button>

<p id="msg"></p>
</div>

<!-- VAULT -->
<div class="vault" id="vault" style="display:none;">
<h3>🔐 Vault (Hidden Items)</h3>

<div class="hiddenItem">📸 Photo_001.jpg</div>
<div class="hiddenItem">🎥 Video_Secret.mp4</div>
<div class="hiddenItem">📁 Private Files</div>

<p style="font-size:12px;">(Simulation only - real hiding needs Android app)</p>
</div>

</div>

<script>

let shift=false;
let secret=Math.floor(Math.random()*10)+1;

/* BASIC */
function append(v){document.getElementById("display").value+=v;}
function clearDisplay(){document.getElementById("display").value="";}

function calculate(){
try{
document.getElementById("display").value =
Function("return "+document.getElementById("display").value)();
}catch{
alert("Invalid");
}
}

/* TRIG + SHIFT */
function toggleShift(){
shift=!shift;
alert(shift ? "SHIFT ON (inverse mode)" : "SHIFT OFF (normal mode)");
}

function trig(type){
let d=document.getElementById("display");
let val=eval(d.value||0);

if(!shift){
if(type==="sin") d.value=Math.sin(val);
if(type==="cos") d.value=Math.cos(val);
if(type==="tan") d.value=Math.tan(val);
}else{
if(type==="sin") d.value=Math.asin(val);
if(type==="cos") d.value=Math.acos(val);
if(type==="tan") d.value=Math.atan(val);
}
}

/* POWER */
function square(){
let d=document.getElementById("display");
d.value=Math.pow(eval(d.value||0),2);
}

function cube(){
let d=document.getElementById("display");
d.value=Math.pow(eval(d.value||0),3);
}

/* GAME */
function openGame(){
document.getElementById("game").style.display="block";
document.getElementById("vault").style.display="none";
}

function check(){
let g=Number(document.getElementById("guess").value);
if(g===secret){
document.getElementById("msg").innerText="🎉 Correct!";
secret=Math.floor(Math.random()*10)+1;
}else if(g>secret){
document.getElementById("msg").innerText="📉 Too High";
}else{
document.getElementById("msg").innerText="Too Low";
}
}

/* VAULT */
function openVault(){
document.getElementById("vault").style.display="block";
document.getElementById("game").style.display="none";
}

</script>

</body>
</html>
