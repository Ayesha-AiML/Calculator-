<!DOCTYPE html>
<html>
<head>
<title>Professional Calculator</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
font-family:Arial;
}

.calculator{
background:#1e1e2f;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

#display{
width:260px;
height:60px;
font-size:26px;
text-align:right;
margin-bottom:10px;
border:none;
outline:none;
padding:10px;
border-radius:10px;
background:#2c2c3e;
color:white;
}

button{
width:60px;
height:60px;
margin:5px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.1);
}

.num{
background:#444;
color:white;
}

.op{
background:#ff9f43;
color:white;
}

.equal{
background:#2ed573;
color:white;
}

.clear{
background:#ff4757;
color:white;
width:130px;
}
</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" readonly>

<br>

<button class="num" onclick="append('7')">7</button>
<button class="num" onclick="append('8')">8</button>
<button class="num" onclick="append('9')">9</button>
<button class="op" onclick="append('/')">÷</button>

<br>

<button class="num" onclick="append('4')">4</button>
<button class="num" onclick="append('5')">5</button>
<button class="num" onclick="append('6')">6</button>
<button class="op" onclick="append('*')">×</button>

<br>

<button class="num" onclick="append('1')">1</button>
<button class="num" onclick="append('2')">2</button>
<button class="num" onclick="append('3')">3</button>
<button class="op" onclick="append('-')">-</button>

<br>

<button class="num" onclick="append('0')">0</button>
<button class="num" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button class="op" onclick="append('+')">+</button>

<br>

<button class="clear" onclick="clearDisplay()">C</button>

</div>

<script>

function append(value){
document.getElementById("display").value += value;
}

function clearDisplay(){
document.getElementById("display").value = "";
}

function calculate(){
try{
document.getElementById("display").value =
eval(document.getElementById("display").value);
}
catch{
alert("Invalid Input");
}
}

</script>

</body>
</html>
