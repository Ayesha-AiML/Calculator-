<!DOCTYPE html>
<html>
<head>
<title>Smart App</title>

<style>
body {
font-family: Arial;
background: #111;
color: white;
text-align: center;
transition: 0.3s;
}

.light {
background: #f2f2f2;
color: black;
}

.card {
background: #222;
padding: 15px;
margin: 10px;
border-radius: 10px;
}

.light .card {
background: white;
}

button {
padding: 10px;
margin: 5px;
cursor: pointer;
}

input {
padding: 10px;
width: 80%;
}

.calculator {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 5px;
margin-top: 10px;
}

.calc-display {
width: 90%;
padding: 10px;
font-size: 20px;
}

/* AYESHA TITLE */
@keyframes glow {
0% { text-shadow: 0 0 5px #ff4ecd; }
100% { text-shadow: 0 0 25px #00d4ff; }
}
</style>
</head>

<body>

<!-- AYESHA HEADER -->
<div style="margin-top:25px;">
<h1 style="
font-size:45px;
background: linear-gradient(90deg,#ff4ecd,#7c4dff,#00d4ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:3px;
animation: glow 2s infinite alternate;
">
Ayesha
</h1>
<p style="opacity:0.7;">Focus • Learn • Level Up</p>
</div>

<button onclick="toggleTheme()">🌗 Theme</button>

<!-- DASHBOARD -->
<div class="card">
<h3>📊 Dashboard</h3>
XP: <span id="xp">0</span> |
Level: <span id="level">Beginner</span> |
🔥 Streak: <span id="streak">0</span>
</div>

<!-- DAILY STYLE CHALLENGE (NOW INFINITE) -->
<div class="card">
<h3>🎯 Challenge</h3>

<p id="challengeText">Loading...</p>

<p>⏱ Time Left: <span id="timer">0</span> sec</p>

<input id="ans" placeholder="Answer">

<button onclick="startChallenge()">Start</button>
<button onclick="check()">Submit</button>
</div>

<!-- CALCULATOR -->
<div class="card">
<h3>🧮 Calculator</h3>

<input id="display" class="calc-display" disabled>

<div class="calculator">
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">/</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">*</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">-</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="calc()">=</button>
<button onclick="press('+')">+</button>

<button onclick="backspace()">⌫</button>
<button onclick="clearDisplay()">C</button>
</div>
</div>

<!-- HISTORY -->
<div class="card">
<h3>📜 History</h3>
<div id="history"></div>
<button onclick="clearHistory()">Clear History</button>
</div>

<script>
let xp = parseInt(localStorage.getItem("xp")) || 0;
let streak = parseInt(localStorage.getItem("streak")) || 0;
let history = JSON.parse(localStorage.getItem("history") || "[]");

let challengeIndex = parseInt(localStorage.getItem("challengeIndex")) || 0;

/* 100 CHALLENGES */
let challenges = Array.from({length: 100}, (_, i) => {
return {
q: `Find value of ${i+1} + ${i+2}`,
a: (i+1 + i+2).toString()
};
});

/* LOAD CHALLENGE */
let current;

function loadChallenge() {
current = challenges[challengeIndex];
document.getElementById("challengeText").innerText = current.q;
}

loadChallenge();

/* TIMER */
let challengeStarted = false;
let timeLeft = 60;
let timerInterval;

function startChallenge() {
if (challengeStarted) return;

challengeStarted = true;
startTimer();
}

function startTimer() {
clearInterval(timerInterval);
timeLeft = 60;
document.getElementById("timer").innerText = timeLeft;

timerInterval = setInterval(() => {
timeLeft--;
document.getElementById("timer").innerText = timeLeft;

if (timeLeft <= 0) {
clearInterval(timerInterval);
streak = 0;
localStorage.setItem("streak", streak);
alert("⏰ Time Over!");
updateUI();
}
}, 1000);
}

/* CHECK ANSWER → NEXT CHALLENGE */
function check() {
if (!challengeStarted) {
alert("Start challenge first!");
return;
}

clearInterval(timerInterval);

let userAns = document.getElementById("ans").value;

if (userAns === current.a) {
xp += 10;
streak += 1;

challengeIndex++;
localStorage.setItem("challengeIndex", challengeIndex);

alert("Correct +10 XP → Next Challenge");

loadChallenge();
document.getElementById("ans").value = "";
challengeStarted = false;
} else {
streak = 0;
alert("Wrong Answer");
}

localStorage.setItem("xp", xp);
localStorage.setItem("streak", streak);

updateUI();
}

/* CALCULATOR */
function press(val){ document.getElementById("display").value += val; }

function calc(){
try{
let r = eval(document.getElementById("display").value);
history.push(document.getElementById("display").value + " = " + r);
localStorage.setItem("history", JSON.stringify(history));
document.getElementById("display").value = r;
updateHistory();
}catch{
alert("Invalid");
}
}

function clearDisplay(){
document.getElementById("display").value="";
}

function backspace(){
let d=document.getElementById("display");
d.value=d.value.slice(0,-1);
}

/* HISTORY */
function updateHistory(){
document.getElementById("history").innerHTML =
history.map(h => `<p>${h}</p>`).join("");
}

function clearHistory(){
history=[];
localStorage.setItem("history", JSON.stringify(history));
updateHistory();
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("light");
}

/* UI */
function updateUI(){
document.getElementById("xp").innerText = xp;
document.getElementById("streak").innerText = streak;

let level =
streak < 5 ? "Beginner" :
streak < 10 ? "Intermediate" :
streak < 20 ? "Advanced" :
streak < 30 ? "Pro" : "Master";

document.getElementById("level").innerText = level;
}

updateUI();
updateHistory();
</script>

</body>
</html>
