<!DOCTYPE html>
<html>
<head>
<title>Smart App</title>

<style>
body {
font-family: Arial;
background: #111;
color: white;
text-align: center;
transition: 0.3s;
}

.light {
background: #f2f2f2;
color: black;
}

.card {
background: #222;
padding: 15px;
margin: 10px;
border-radius: 10px;
}

.light .card {
background: white;
}

button {
padding: 10px;
margin: 5px;
cursor: pointer;
}

input {
padding: 10px;
width: 80%;
}

.calculator {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 5px;
margin-top: 10px;
}

.calc-display {
width: 90%;
padding: 10px;
font-size: 20px;
}
</style>
</head>

<body>

<button onclick="toggleTheme()">🌗 Theme</button>

<!-- DASHBOARD -->
<div class="card">
<h3>📊 Dashboard</h3>
XP: <span id="xp">0</span> |
Level: <span id="level">Beginner</span> |
🔥 Streak: <span id="streak">0</span>
</div>

<!-- DAILY CHALLENGE -->
<div class="card">
<h3>🎯 Daily Challenge</h3>

<p id="challengeText">Loading...</p>

<p>⏱ Time Left: <span id="timer">0</span> sec</p>

<input id="ans" placeholder="Answer">

<button onclick="startChallenge()">Start Challenge</button>
<button onclick="check()">Submit</button>
</div>

<!-- CALCULATOR -->
<div class="card">
<h3>🧮 Calculator</h3>

<input id="display" class="calc-display" disabled>

<div class="calculator">
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">/</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">*</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">-</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="calc()">=</button>
<button onclick="press('+')">+</button>

<button onclick="backspace()">⌫</button>
<button onclick="clearDisplay()">C</button>
</div>
</div>

<!-- HISTORY -->
<div class="card">
<h3>📜 History</h3>
<div id="history"></div>
<button onclick="clearHistory()">Clear History</button>
</div>

<script>
let xp = parseInt(localStorage.getItem("xp")) || 0;
let streak = parseInt(localStorage.getItem("streak")) || 0;
let lastDay = localStorage.getItem("lastDay") || "";
let solvedToday = localStorage.getItem("solvedToday") || "no";
let startDayCount = parseInt(localStorage.getItem("startDayCount")) || 0;

let history = JSON.parse(localStorage.getItem("history") || "[]");

let display = document.getElementById("display");

/* ---------------- 100 CHALLENGES ---------------- */
let challenges = Array.from({length: 100}, (_, i) => {
return {
q: `Find value of ${i+1} + ${i+2}`,
a: (i+1 + i+2).toString()
};
});

let todayIndex = new Date().getDate() % 100;
let current = challenges[todayIndex];

document.getElementById("challengeText").innerText = current.q;

/* ---------------- DAILY SYSTEM FIX ---------------- */
let today = new Date().toDateString();

if (lastDay !== today) {

localStorage.setItem("solvedToday", "no");

/* streak logic */
if (lastDay !== "") {
let prev = new Date(lastDay);
let now = new Date(today);

let diffDays = Math.floor((now - prev) / (1000*60*60*24));

if (diffDays === 1) {
streak += 1;
startDayCount += 1;
} else if (diffDays > 1) {
streak = 0;
startDayCount = 1;
}
} else {
startDayCount = 1;
}

localStorage.setItem("lastDay", today);
localStorage.setItem("streak", streak);
localStorage.setItem("startDayCount", startDayCount);
}

/* ---------------- TIMER CONTROL ---------------- */
let challengeStarted = false;
let timeLeft = 60;
let timerInterval;

function startChallenge() {
if (solvedToday === "yes") {
alert("Aaj ka challenge already complete!");
return;
}

if (challengeStarted) return;

challengeStarted = true;
startTimer();
alert("Challenge Started!");
}

function startTimer() {
clearInterval(timerInterval);
timeLeft = 60;
document.getElementById("timer").innerText = timeLeft;

timerInterval = setInterval(() => {
timeLeft--;
document.getElementById("timer").innerText = timeLeft;

if (timeLeft <= 0) {
clearInterval(timerInterval);
streak = 0;
localStorage.setItem("streak", streak);
alert("⏰ Time Over!");
updateUI();
}
}, 1000);
}

/* ---------------- CHECK ANSWER ---------------- */
function check() {
if (solvedToday === "yes") {
alert("Already done!");
return;
}

if (!challengeStarted) {
alert("Pehle Start Challenge dabao!");
return;
}

clearInterval(timerInterval);

let userAns = document.getElementById("ans").value;

if (userAns === current.a) {
xp += 10;
solvedToday = "yes";
alert("Correct +10 XP");
} else {
streak = 0;
alert("Wrong Answer");
}

localStorage.setItem("xp", xp);
localStorage.setItem("streak", streak);
localStorage.setItem("solvedToday", solvedToday);

updateUI();
}

/* ---------------- CALCULATOR ---------------- */
function press(val){ display.value += val; }

function calc(){
try{
let r = eval(display.value);
history.push(display.value + " = " + r);
localStorage.setItem("history", JSON.stringify(history));
display.value = r;
updateHistory();
}catch{
alert("Invalid");
}
}

function clearDisplay(){ display.value=""; }

function backspace(){
display.value = display.value.slice(0,-1);
}

/* ---------------- HISTORY ---------------- */
function updateHistory(){
document.getElementById("history").innerHTML =
history.map(h => `<p>${h}</p>`).join("");
}

function clearHistory(){
history = [];
localStorage.setItem("history", JSON.stringify(history));
updateHistory();
}

/* ---------------- THEME ---------------- */
function toggleTheme(){
document.body.classList.toggle("light");
}

/* ---------------- LEVEL SYSTEM (10 DAY PROGRESSION) ---------------- */
function updateUI(){

document.getElementById("xp").innerText = xp;
document.getElementById("streak").innerText = streak;

let level = "Beginner";

if (startDayCount >= 30) level = "Master";
else if (startDayCount >= 20) level = "Pro";
else if (startDayCount >= 10) level = "Advanced";
else if (startDayCount >= 5) level = "Intermediate";

document.getElementById("level").innerText = level;
}

updateUI();
updateHistory();
</script>

</body>
</html>
