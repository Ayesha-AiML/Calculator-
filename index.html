<!DOCTYPE html>
<html>
<head>
<title>Smart Scientific Calculator</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
background:#050816;
color:white;
}

.container{
background:#0b1220;
padding:20px;
border-radius:15px;
text-align:center;
}

input{
width:260px;
height:60px;
font-size:24px;
text-align:right;
margin-bottom:10px;
border:none;
border-radius:10px;
padding:10px;
}

button{
width:60px;
height:60px;
margin:4px;
border:none;
border-radius:10px;
cursor:pointer;
}

.num{background:#1f2937;color:white;}
.op{background:#ff9800;}
.equal{background:#00e676;}
.extra{background:#8b5cf6;color:white;}
.clear{background:#ef4444;color:white;}
.mode{background:#00bcd4;color:white;width:130px;}
</style>
</head>

<body>

<div class="container">

<h3>💖 Smart Calculator</h3>

<input id="display" readonly>

<br>

<!-- SHIFT BUTTON -->
<button class="mode" onclick="toggleShift()">SHIFT</button>

<button class="extra" onclick="append('(')">(</button>
<button class="extra" onclick="append(')')">)</button>

<br>

<button class="extra" onclick="trig('sin')">sin</button>
<button class="extra" onclick="trig('cos')">cos</button>
<button class="extra" onclick="trig('tan')">tan</button>

<button class="extra" onclick="square()">x²</button>
<button class="extra" onclick="cube()">x³</button>

<br>

<button class="num" onclick="append('7')">7</button>
<button class="num" onclick="append('8')">8</button>
<button class="num" onclick="append('9')">9</button>
<button class="op" onclick="append('/')">÷</button>

<br>

<button class="num" onclick="append('4')">4</button>
<button class="num" onclick="append('5')">5</button>
<button class="num" onclick="append('6')">6</button>
<button class="op" onclick="append('*')">×</button>

<br>

<button class="num" onclick="append('1')">1</button>
<button class="num" onclick="append('2')">2</button>
<button class="num" onclick="append('3')">3</button>
<button class="op" onclick="append('-')">-</button>

<br>

<button class="num" onclick="append('0')">0</button>
<button class="num" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button class="op" onclick="append('+')">+</button>

<br>

<button class="clear" onclick="clearDisplay()">C</button>

</div>

<script>

let shift=false;

/* INPUT */
function append(v){
document.getElementById("display").value+=v;
}

function clearDisplay(){
document.getElementById("display").value="";
}

/* CALC */
function calculate(){
try{
document.getElementById("display").value =
Function("return "+document.getElementById("display").value)();
}catch{
alert("Invalid Input");
}
}

/* SHIFT MODE */
function toggleShift(){
shift=!shift;
alert(shift ? "SHIFT ON (Inverse Mode)" : "SHIFT OFF (Normal Mode)");
}

/* TRIG FUNCTIONS */
function trig(type){
let d=document.getElementById("display");
let val=eval(d.value||0);

if(!shift){
if(type==="sin") d.value=Math.sin(val);
if(type==="cos") d.value=Math.cos(val);
if(type==="tan") d.value=Math.tan(val);
}else{
if(type==="sin") d.value=Math.asin(val);
if(type==="cos") d.value=Math.acos(val);
if(type==="tan") d.value=Math.atan(val);
}
}

/* POWER */
function square(){
let d=document.getElementById("display");
d.value=Math.pow(eval(d.value||0),2);
}

function cube(){
let d=document.getElementById("display");
d.value=Math.pow(eval(d.value||0),3);
}

</script>

</body>
</html>
