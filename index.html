<script>

let history = JSON.parse(localStorage.getItem('history') || '[]');

let xp = parseInt(localStorage.getItem('xp')) || 0;
let streak = parseInt(localStorage.getItem('streak')) || 0;

/* Challenges */
let challenges = [

{q:"Find Force if m=2kg and a=3m/s²",a:"6"},
{q:"Find Speed if d=20m and t=4s",a:"5"},
{q:"Find Power if W=100J and t=10s",a:"10"},
{q:"Find Charge if I=2A and t=5s",a:"10"},
{q:"Find Frequency if T=0.5s",a:"2"},
{q:"Find Momentum if m=5kg and v=2m/s",a:"10"},
{q:"Find Work if F=10N and d=5m",a:"50"}

];

let currentAnswer = "";

/* Calculator */

function add(v){
display.value += v;
}

function clearD(){
display.value = '';
}

function backspace(){
display.value = display.value.slice(0,-1);
}

/* Level System */

function updateLevel(){

document.getElementById('xp').innerText = xp;
document.getElementById('streak').innerText = streak;

let level = "Beginner";

if(xp >= 25) level = "Explorer";
if(xp >= 50) level = "Scientist";
if(xp >= 100) level = "Physics Master";
if(xp >= 200) level = "Einstein";

document.getElementById('level').innerText = level;

localStorage.setItem('xp',xp);
localStorage.setItem('streak',streak);

}

/* Solve */

function solve(){

try{

let r = eval(display.value);

history.unshift(display.value + ' = ' + r);

localStorage.setItem(
'history',
JSON.stringify(history)
);

display.value = r;

xp++;

updateLevel();

showHistory();

}catch{

alert('Invalid Input ❌');

}

}

/* History */

function showHistory(){

document.getElementById('history').innerHTML =
history.join('<br>');

}

function clearHistory(){

history = [];

localStorage.removeItem('history');

showHistory();

}

/* Random Challenge */

function loadChallenge(){

let random =
challenges[Math.floor(Math.random()*challenges.length)];

currentAnswer = random.a;

document.querySelector(".card:nth-of-type(4) p").innerHTML =
random.q;

document.getElementById("ans").value = "";

}

/* Check Answer */

function check(){

let user =
document.getElementById("ans").value.trim();

if(user === currentAnswer){

xp += 10;

streak++;

updateLevel();

alert(
"Correct 🎉\\n+10 XP\\n🔥 Streak Increased"
);

loadChallenge();

}else{

alert("Wrong ❌ Try Again");

}

}

/* Load */

window.onload = function(){

showHistory();

updateLevel();

loadChallenge();

}

</script>
