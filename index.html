<!DOCTYPE html>
<html>
<head>
<title>Ayesha Master Calculator</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
transition:0.5s;
}

/* LIGHT MODE */
.light{
background:linear-gradient(135deg,#fdfbfb,#ebedee) !important;
}

#login{
position:absolute;
width:100%;
height:100%;
background:#0b1220;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
}

#login input{
padding:10px;
font-size:18px;
margin:10px;
border:none;
border-radius:8px;
}

#login button{
padding:10px 20px;
background:#ff4d6d;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.container{
display:none;
gap:20px;
}

.calculator{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

.light .calculator{
background:white;
}

.brand{
color:#ff4d6d;
font-size:22px;
font-weight:bold;
margin-bottom:5px;
}

.tag{
color:#9ca3af;
font-size:12px;
margin-bottom:10px;
}

#display{
width:260px;
height:60px;
font-size:24px;
text-align:right;
margin-bottom:10px;
border:none;
outline:none;
padding:10px;
border-radius:10px;
background:#1f2937;
color:white;
}

.light #display{
background:#f1f1f1;
color:black;
}

button{
width:60px;
height:60px;
margin:4px;
border:none;
border-radius:10px;
font-size:14px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.num{background:#374151;color:white;}
.op{background:#f59e0b;color:white;}
.equal{background:#10b981;color:white;}
.clear{background:#ef4444;color:white;width:125px;}
.science{background:#6366f1;color:white;}
.mode{background:#3b82f6;color:white;width:125px;}

.history{
background:#0b1220;
padding:15px;
border-radius:15px;
width:170px;
color:white;
font-size:12px;
height:300px;
overflow:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>🔐 Ayesha Calculator</h2>
<p>Enter Password</p>
<input type="password" id="pass">
<button onclick="checkPass()">Unlock</button>
</div>

<!-- APP -->
<div class="container" id="app">

<div class="calculator">

<div class="brand">💖 AYESHA 💖</div>
<div class="tag">Master Scientific Calculator</div>

<input type="text" id="display" readonly>

<br>

<!-- SCIENTIFIC -->
<button class="science" onclick="append('Math.sin(')">sin</button>
<button class="science" onclick="append('Math.cos(')">cos</button>
<button class="science" onclick="append('Math.tan(')">tan</button>
<button class="science" onclick="append('Math.sqrt(')">√</button>

<br>

<button class="num" onclick="append('7')">7</button>
<button class="num" onclick="append('8')">8</button>
<button class="num" onclick="append('9')">9</button>
<button class="op" onclick="append('/')">÷</button>

<br>

<button class="num" onclick="append('4')">4</button>
<button class="num" onclick="append('5')">5</button>
<button class="num" onclick="append('6')">6</button>
<button class="op" onclick="append('*')">×</button>

<br>

<button class="num" onclick="append('1')">1</button>
<button class="num" onclick="append('2')">2</button>
<button class="num" onclick="append('3')">3</button>
<button class="op" onclick="append('-')">-</button>

<br>

<button class="num" onclick="append('0')">0</button>
<button class="num" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button class="op" onclick="append('+')">+</button>

<br>

<button class="clear" onclick="clearDisplay()">C</button>
<button class="mode" onclick="toggleMode()">🌙 Mode</button>

</div>

<!-- HISTORY -->
<div class="history">
<h3>📜 History</h3>
<div id="history"></div>
</div>

</div>

<script>

let PASSWORD = "Ayesha123";

/* LOCK */
function checkPass(){
let p = document.getElementById("pass").value;
if(p === PASSWORD){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";
}else{
alert("Wrong Password");
}
}

/* INPUT */
function append(v){
document.getElementById("display").value += v;
}

/* CLEAR */
function clearDisplay(){
document.getElementById("display").value="";
}

/* VOICE (ONLY RESULT) */
function speak(text){
let msg = new SpeechSynthesisUtterance(String(text));
msg.lang = "en-US";
msg.rate = 1;
msg.pitch = 1;
speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

/* CALCULATE */
function calculate(){
try{
let exp = document.getElementById("display").value;
let result = eval(exp);

document.getElementById("display").value = result;

/* HISTORY SAVE */
let history = JSON.parse(localStorage.getItem("history") || "[]");
history.push(exp + " = " + result);
localStorage.setItem("history", JSON.stringify(history));

document.getElementById("history").innerHTML =
history.map(h => "<div>"+h+"</div>").join("");

/* VOICE ONLY RESULT */
speak(result);

}catch{
alert("Invalid Input");
}
}

/* LOAD HISTORY */
window.onload = function(){
let history = JSON.parse(localStorage.getItem("history") || "[]");
document.getElementById("history").innerHTML =
history.map(h => "<div>"+h+"</div>").join("");
}

/* MODE TOGGLE */
function toggleMode(){
document.body.classList.toggle("light");
}

</script>

</body>
</html>
