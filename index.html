<!DOCTYPE html>
<html>
<head>
<title>Ayesha Smart Calculator</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
width:340px;
}

.brand{
font-size:28px;
font-weight:bold;
background:linear-gradient(90deg,#ff4d6d,#8b5cf6,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:280px;
height:50px;
font-size:18px;
margin:8px 0;
border:none;
border-radius:10px;
padding:10px;
}

button{
padding:10px;
margin:4px;
border:none;
border-radius:8px;
cursor:pointer;
}

.calc{background:#10b981;color:white;}
.ex{background:#8b5cf6;color:white;}
</style>
</head>

<body>

<div class="box">

<div class="brand">AYESHA</div>
<p>Smart Calculator + Physics Solver</p>

<!-- KEYBOARD INPUT -->
<input id="input" placeholder="Type: 10*5 OR F=10*5 OR v=20/5">

<br>

<!-- QUICK BUTTONS -->
<button class="ex" onclick="setText('v=20/5')">Speed</button>
<button class="ex" onclick="setText('F=10*5')">Force</button>
<button class="ex" onclick="setText('V=2*3')">Ohm</button>

<br>

<button class="calc" onclick="solve()">Solve</button>

<p id="result" style="font-weight:bold;margin-top:10px;"></p>

</div>

<script>

/* SET TEXT */
function setText(v){
document.getElementById("input").value=v;
}

/* MAIN SOLVER */
function solve(){
let text=document.getElementById("input").value.toLowerCase();

/* SPEED */
if(text.includes("v=") && text.includes("/")){
let nums=text.match(/\d+/g);
if(nums.length>=2){
let result=nums[0]/nums[1];
show("Speed = "+nums[0]+" ÷ "+nums[1]+" = "+result+" m/s");
return;
}
}

/* FORCE */
if(text.includes("f=") || text.includes("force")){
let nums=text.match(/\d+/g);
if(nums.length>=2){
let result=nums[0]*nums[1];
show("Force = "+nums[0]+" × "+nums[1]+" = "+result+" N");
return;
}
}

/* OHM */
if(text.includes("v=") && text.includes("*")){
let nums=text.match(/\d+/g);
if(nums.length>=2){
let result=nums[0]*nums[1];
show("Voltage = "+result+" V");
return;
}
}

/* GENERAL MATH */
try{
let clean=text.replace(/[a-zA-Z= ]/g,"");
let result=Function("return "+clean)();
show("Answer = "+result);
}catch{
show("Invalid Input ❌");
}
}

/* SHOW RESULT */
function show(r){
document.getElementById("result").innerText=r;
}

</script>

</body>
</html>
